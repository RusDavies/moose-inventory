name: Release gem

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  push:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Check out repository
        # actions/checkout v5 pinned for workflow supply-chain integrity.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up Ruby
        # ruby/setup-ruby v1 pinned for workflow supply-chain integrity.
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Set up Go for security tools
        # actions/setup-go v6 pinned for workflow supply-chain integrity.
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.25.x'
          cache: false

      - name: Install native build dependencies
        timeout-minutes: 5
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential default-libmysqlclient-dev libpq-dev libsqlite3-dev

      - name: Install security audit tools
        run: ./scripts/ci/install_security_tools.sh

      - name: Verify tag matches gem version
        run: |
          version="$(ruby -e "require './lib/moose_inventory/version'; puts Moose::Inventory::VERSION")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match gem version $version" >&2
            exit 1
          fi

      - name: Run local check gate
        env:
          MOOSE_INVENTORY_REQUIRE_SECURITY_TOOLS: '1'
        run: ./scripts/check.sh

      - name: Publish gem to RubyGems
        # rubygems/release-gem v1 pinned for trusted-publishing supply-chain integrity.
        uses: rubygems/release-gem@f0d7faff26625599a847d40d9fa28ace24c2aacc
        with:
          await-release: false
